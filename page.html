<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tours in Norway</title>
    <link rel="stylesheet" href="css/style.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <style>
      @font-face {
        font-family: "Gropled";
        src: url("./fonts/gropled-bold-webfont.woff2") format("woff2"),
          url("./fonts/gropled-bold-webfont.woff") format("woff");
        font-weight: normal;
        font-display: swap;
        font-style: normal;
      }
    </style>
  </head>

  <body>
    <div class="wrapper">
      <header class="header">
        <div class="container">
          <div class="header__inner">
            <a class="logo" href="#"><img src="./images/logo.svg" alt="" /></a>
            <div class="menu__btn">
              <div id="hamburger">
                <span></span>
                <span></span>
                <span></span>
              </div>
              <div id="cross">
                <span></span>
                <span></span>
              </div>
            </div>
            <nav class="menu">
              <ul class="menu__list">
                <li class="menu__list-item">
                  <a href="#" class="menu__list-link">Tours</a>
                </li>
                <li class="menu__list-item">
                  <a href="#" class="menu__list-link">Rules</a>
                </li>
                <li class="menu__list-item">
                  <a href="#" class="menu__list-link">Gallery</a>
                </li>
                <li class="menu__list-item">
                  <a href="#" class="menu__list-link">Contacts</a>
                </li>
              </ul>
            </nav>
          </div>
        </div>
      </header>

      <main class="main"></main>

      <footer class="footer">
        <div class="footer__content">
          <div class="container">
          <div class="footer__contact">
            <h1 class="footer__title title">Leave <span>a</span> request</h1>
            <form class="footer__contact-form" action="">
              <input class="footer__form-input" type="text" placeholder="Name" />
              <input
                class="footer__form-input"
                type="tel"
                placeholder="Phone number"
              />
              <button class="footer__form-button" type="submit">Send</button>
            </form>
        </div>
      </div>
      </div>
        <div class="footer__inner">
          <div class="container">
            <div class="footer__info">
              <ul class="footer__social-list">
                <li class="footer__social-list-item">
                  <a href="#" class="footer__social-link"
                    ><img
                      class="footer__social-link-icon"
                      src="./images/icons/instagram.svg"
                      alt=""
                  /></a>
                </li>
                <li class="footer__social-list-item">
                  <a href="#" class="footer__social-link"
                    ><img
                      class="footer__social-link-icon"
                      src="./images/icons/telegram.svg"
                      alt=""
                  /></a>
                </li>
                <li class="footer__social-list-item">
                  <a href="#" class="footer__social-link"
                    ><img
                      class="footer__social-link-icon"
                      src="./images/icons/whatsapp.svg"
                      alt=""
                  /></a>
                </li>
              </ul>
              <ul class="footer__contact-list">
                <li class="footer__contact-list-item">
                  <a class="footer__contact-link" href="tel:+47996936497"
                    >+47 (99) 693-64-97</a
                  >
                </li>
                <li class="footer__contact-list-item">
                  <a class="footer__contact-link" href="mailto:info@gmail.com"
                    >info@gmail.com</a
                  >
                </li>
              </ul>
              <h4 class="footer__copy">© 2022 Designed by Valentina</h4>
            </div>
          </div>
        </div>
      </footer>
    </div>

    <script src="js/main.min.js"></script>
  </body>
</html>
